<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart - Shop Smart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <h1>🛒 NovaCart</h1>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
        <button>🔍</button>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Deals</a>
        <a href="#">Cart 🛒</a>
        <a href="#">Login</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to NovaCart</h2>
    <p>Everything you need, all in one place.</p>
    <button>Start Shopping</button>
</section>

<section class="categories">
    <h2>Popular Categories</h2>

    <div class="category-grid">
        <div class="card">📱 Electronics</div>
        <div class="card">👕 Fashion</div>
        <div class="card">💻 Laptops</div>
        <div class="card">⌚ Watches</div>
        <div class="card">🎧 Accessories</div>
        <div class="card">🏠 Home</div>
    </div>
</section>

<footer>
    <p>© 2026 NovaCart. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
